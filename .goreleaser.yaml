version: 2

project_name: remote-shell-mcp

before:
  hooks:
    - go mod tidy

builds:
  - id: daemon
    main: ./cmd/remote-shell-mcpd
    binary: remote-shell-mcpd
    env:
      - CGO_ENABLED=0
    goos: [darwin, linux, windows, freebsd]
    goarch: [amd64, arm64, arm, riscv64]
    goarm: ["7"]
    ignore:
      # 32-bit ARM is a Linux-only audience for us; Pi 2/3/Zero-2.
      - goos: darwin
        goarch: arm
      - goos: windows
        goarch: arm
      - goos: freebsd
        goarch: arm
      # riscv64 is Linux-only in practice (no Windows/macOS support).
      - goos: darwin
        goarch: riscv64
      - goos: windows
        goarch: riscv64
      - goos: freebsd
        goarch: riscv64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}

  - id: launcher
    main: ./cmd/remote-shell-mcp
    binary: remote-shell-mcp
    env:
      - CGO_ENABLED=0
    goos: [darwin, linux, windows, freebsd]
    goarch: [amd64, arm64, arm, riscv64]
    goarm: ["7"]
    ignore:
      - goos: darwin
        goarch: arm
      - goos: windows
        goarch: arm
      - goos: freebsd
        goarch: arm
      - goos: darwin
        goarch: riscv64
      - goos: windows
        goarch: riscv64
      - goos: freebsd
        goarch: riscv64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}

# Combined amd64+arm64 Mach-O so a single tarball runs on any modern Mac.
universal_binaries:
  - id: daemon-universal
    ids: [daemon]
    name_template: remote-shell-mcpd
    replace: false
  - id: launcher-universal
    ids: [launcher]
    name_template: remote-shell-mcp
    replace: false

archives:
  - id: default
    ids: [daemon, launcher]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}{{ with .Arm }}v{{ . }}{{ end }}
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - LICENSE
      - README.md

  - id: universal
    ids: [daemon-universal, launcher-universal]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_darwin_universal
    formats: [tar.gz]
    files:
      - LICENSE
      - README.md

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - "^docs?:"
      - "^test:"
      - "^chore:"
      - "Merge pull request"

release:
  github:
    owner: jaenster
    name: remote-shell-mcp
  header: |
    ## remote-shell-mcp {{ .Tag }}

    Install with:
    ```
    curl -fsSL https://raw.githubusercontent.com/jaenster/remote-shell-mcp/main/install.sh | sh
    ```

    Or download the archive for your platform below.
